<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM FRAME • Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/crm.css" />
</head>
<body>
  <main class="login-page">
    <section class="login-card">
      <a href="/" class="crm-brand">
        <img src="/assets/logo_icon.png" alt="FRAME" />
        <div>
          <strong>FRAME CRM</strong>
          <span>Gestão comercial dos diagnósticos</span>
        </div>
      </a>
      <div class="notice">Entre com o usuário e a senha definidos no seu <code>.env</code>.</div>
      <div id="loginError" class="error hidden"></div>
      <form id="crmLoginForm">
        <label for="user">Usuário</label>
        <input id="user" name="user" autocomplete="username" placeholder="admin" required />
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
        <button class="btn btn-primary" type="submit" style="width:100%;margin-top:8px;">Entrar no CRM</button>
      </form>
    </section>
  </main>
  <script src="/crm-login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Download Template - FRAME</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      background: #121212;
      padding: 40px;
      border-radius: 12px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #ccc;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #ff7a00;
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .hidden {
      display: none;
      margin-top: 20px;
    }

    a.download {
      display: inline-block;
      margin-top: 15px;
      color: #ff7a00;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Baixe seu template profissional</h1>
  <p>Preencha para liberar o download</p>

  <form id="leadForm">
    <input type="text" placeholder="Seu nome" required>
    <input type="email" placeholder="Seu e-mail" required>
    <input type="text" placeholder="Empresa">
    <button type="submit">Liberar Download</button>
  </form>

  <div id="download" class="hidden">
    <p>Download liberado 👇</p>
    <a class="download" href="Corporativo_01.pptx" download>
      Baixar Template
    </a>
  </div>

</div>

<script>
  const form = document.getElementById("leadForm");
  const download = document.getElementById("download");

  form.addEventListener("submit", function(e){
    e.preventDefault();

    // aqui depois podemos integrar com backend
    download.classList.remove("hidden");
    form.style.display = "none";

    window.location.href = "https://wa.me/5516981511992?text=Acabei de baixar o template da FRAME";
    
  });
</script>

</body>
</html>
